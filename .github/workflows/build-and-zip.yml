name: Build and Zip

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@main

    - name: Set up build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential gcc-multilib g++-multilib

    - name: Build SDK (libPS4)
      run: make -C libPS4

    - name: Build Payloads
      run: |
        examples=(
          "ps4-app-dumper"
          "ps4-app2usb"
          "ps4-backup"
          "ps4-disable-aslr"
          "ps4-disable-updates"
          "ps4-enable-browser"
          "ps4-enable-updates"
          "ps4-exit-idu"
          "ps4-fan-threshold"
          "ps4-ftp"
          "ps4-history-blocker"
          "ps4-kernel-clock"
          "ps4-kernel-dumper"
          "ps4-restore"
          "ps4-rif-renamer"
          "ps4-todex"
          "ps4-pup-decrypt"
          "ps4-permanent-uart"
          "ps4-module-dumper"
        )

        mkdir -p PS4-Payloads
        for example in "${examples[@]}"; do
          echo "Building $example..."
          make -C "examples/$example"
          if [ -f "examples/$example/$example.bin" ]; then
            cp "examples/$example/$example.bin" PS4-Payloads/
          fi
          if [ -f "examples/$example/$example.elf" ]; then
            cp "examples/$example/$example.elf" PS4-Payloads/
          fi
        done
        
        zip -r PS4-Payloads.zip PS4-Payloads/

    - name: Release for branch master
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create v1.0.${{ github.run_number }} PS4-Payloads.zip --target ${{ github.sha }} -t "Release v1.0.${{ github.run_number }}"
